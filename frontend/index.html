<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API de Inventario</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <header class="bg-blue-500 text-white p-4 text-center">
        <h1 class="text-3xl">API de Inventario</h1>
    </header>
    <main class="p-4 mt-4">
        <section class="mb-4">
            <h2 class="text-2xl">Categorías</h2>
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" id="btn-crear-categoria">Crear Categoría</button>
            <ul id="lista-categorias" class="list-none mt-4"></ul>
        </section>
        <section class="mb-4">
            <h2 class="text-2xl">Productos</h2>
            <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded" id="btn-crear-producto">Crear Producto</button>
            <ul id="lista-productos" class="list-none mt-4"></ul>
        </section>
        <section class="mb-4">
            <h2 class="text-2xl">Movimientos de Inventario</h2>
            <form id="form-movimiento-inventario" class="mt-4">
                <label for="tipo-movimiento">Tipo de Movimiento:</label>
                <select id="tipo-movimiento" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                    <option value="entrada">Entrada</option>
                    <option value="salida">Salida</option>
                    <option value="ajuste">Ajuste</option>
                </select>
                <label for="cantidad-movimiento" class="mt-4">Cantidad:</label>
                <input type="number" id="cantidad-movimiento" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-4" id="btn-registrar-movimiento">Registrar Movimiento</button>
            </form>
        </section>
    </main>
    <div id="modal-crear-categoria" class="hidden fixed top-0 left-0 z-10 w-full h-full bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-4 rounded-md shadow-md">
            <h2 class="text-2xl">Crear Categoría</h2>
            <form id="form-crear-categoria" class="mt-4">
                <label for="nombre-categoria">Nombre:</label>
                <input type="text" id="nombre-categoria" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <label for="descripcion-categoria" class="mt-4">Descripción:</label>
                <textarea id="descripcion-categoria" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-4" id="btn-guardar-categoria">Guardar</button>
            </form>
        </div>
    </div>
    <div id="modal-crear-producto" class="hidden fixed top-0 left-0 z-10 w-full h-full bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white p-4 rounded-md shadow-md">
            <h2 class="text-2xl">Crear Producto</h2>
            <form id="form-crear-producto" class="mt-4">
                <label for="nombre-producto">Nombre:</label>
                <input type="text" id="nombre-producto" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <label for="descripcion-producto" class="mt-4">Descripción:</label>
                <textarea id="descripcion-producto" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"></textarea>
                <label for="precio-producto" class="mt-4">Precio:</label>
                <input type="number" id="precio-producto" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <label for="cantidad-en-stock" class="mt-4">Cantidad en Stock:</label>
                <input type="number" id="cantidad-en-stock" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500">
                <label for="categoria-producto" class="mt-4">Categoría:</label>
                <select id="categoria-producto" class="block w-full p-2 pl-10 text-sm text-gray-700 border border-gray-300 rounded-md focus:outline-none focus:ring-blue-500 focus:border-blue-500"></select>
                <button class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded mt-4" id="btn-guardar-producto">Guardar</button>
            </form>
        </div>
    </div>
    <script>
        const listaCategorias = document.getElementById('lista-categorias');
        const listaProductos = document.getElementById('lista-productos');
        const btnCrearCategoria = document.getElementById('btn-crear-categoria');
        const btnCrearProducto = document.getElementById('btn-crear-producto');
        const modalCrearCategoria = document.getElementById('modal-crear-categoria');
        const modalCrearProducto = document.getElementById('modal-crear-producto');
        const formCrearCategoria = document.getElementById('form-crear-categoria');
        const formCrearProducto = document.getElementById('form-crear-producto');
        const btnGuardarCategoria = document.getElementById('btn-guardar-categoria');
        const btnGuardarProducto = document.getElementById('btn-guardar-producto');
        const formMovimientoInventario = document.getElementById('form-movimiento-inventario');
        const btnRegistrarMovimiento = document.getElementById('btn-registrar-movimiento');

        btnCrearCategoria.addEventListener('click', () => {
            modalCrearCategoria.classList.remove('hidden');
        });

        btnCrearProducto.addEventListener('click', () => {
            modalCrearProducto.classList.remove('hidden');
            fetch('http://localhost:8000/categorias/')
                .then(response => response.json())
                .then(categorias => {
                    const selectCategoria = document.getElementById('categoria-producto');
                    categorias.forEach(categoria => {
                        const option = document.createElement('option');
                        option.value = categoria.id;
                        option.text = categoria.nombre;
                        selectCategoria.appendChild(option);
                    });
                });
        });

        btnGuardarCategoria.addEventListener('click', (e) => {
            e.preventDefault();
            const nombreCategoria = document.getElementById('nombre-categoria').value;
            const descripcionCategoria = document.getElementById('descripcion-categoria').value;
            fetch('http://localhost:8000/categorias/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    nombre: nombreCategoria,
                    descripcion: descripcionCategoria
                })
            })
                .then(response => response.json())
                .then(categoria => {
                    const li = document.createElement('li');
                    li.textContent = categoria.nombre;
                    listaCategorias.appendChild(li);
                    modalCrearCategoria.classList.add('hidden');
                });
        });

        btnGuardarProducto.addEventListener('click', (e) => {
            e.preventDefault();
            const nombreProducto = document.getElementById('nombre-producto').value;
            const descripcionProducto = document.getElementById('descripcion-producto').value;
            const precioProducto = document.getElementById('precio-producto').value;
            const cantidadEnStock = document.getElementById('cantidad-en-stock').value;
            const categoriaProducto = document.getElementById('categoria-producto').value;
            fetch('http://localhost:8000/productos/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
